services:
  nginx:
    build:
      context: .
      dockerfile: infrastructure/docker/nginx.dockerfile
    labels:
      - traefik.enable=true
      - traefik.http.routers.workeddy.rule=Host(`workeddy.com`) || Host(`www.workeddy.com`)
      - traefik.http.routers.workeddy.entrypoints=websecure
      - traefik.http.routers.workeddy.tls.certresolver=letsencrypt
      - traefik.http.services.workeddy.loadbalancer.server.port=80
    healthcheck:
      test:
        - CMD-SHELL
        - wget -q -O /dev/null http://127.0.0.1/ || exit 1
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 15s
    volumes:
      - storage_data:/storage:ro
    depends_on:
      - api

  api:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    command:
      - php-fpm
      - -F
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      WORKER_API_BASE_URL: http://nginx
      WorkEddy_VIDEO_WORKER_STORAGE_ROOT: /storage
    restart: unless-stopped
    volumes:
      - storage_data:/storage # same volume as api service
    depends_on:
      mysql:
        condition: service_healthy

  schema-sync:
    build:
      context: .
      dockerfile: Dockerfile
    entrypoint:
      - /bin/sh
      - /var/www/html/infrastructure/docker/schema-sync.sh
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
    restart: no
    volumes:
      - storage_data:/storage
    depends_on:
      mysql:
        condition: service_healthy

  seed:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DOCKER_START_QUEUE_WORKERS: 0
      DOCKER_START_CRON_DAEMON: 0
    command:
      - php
      - bin/console
      - db:seed
      - --no-interaction
    profiles:
      - ops
    restart: no
    volumes:
      - storage_data:/storage
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started

  v2-video-worker:
    build:
      context: .
      dockerfile: infrastructure/docker/video-worker.dockerfile
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      WORKER_API_BASE_URL: http://nginx
      WorkEddy_VIDEO_WORKER_STORAGE_ROOT: /storage
    healthcheck:
      test:
        - CMD
        - python
        - /app/workers/shared/container_healthcheck.py
        - video-worker
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 15s
    restart: unless-stopped
    volumes:
      - storage_data:/storage
    depends_on:
      - nginx

  video-retention:
    build:
      context: .
      dockerfile: Dockerfile
    working_dir: /var/www/html
    env_file:
      - .env
    environment:
      DB_HOST: mysql
      DB_PORT: 3306
      DOCKER_START_QUEUE_WORKERS: 0
      DOCKER_START_CRON_DAEMON: 0
    command:
      - sh
      - -lc
      - while true; do php bin/console privacy:video-retention:enforce; sleep $${VIDEO_CLEANUP_INTERVAL_SECONDS:-86400}; done
    restart: no
    volumes:
      - storage_data:/storage
    depends_on:
      mysql:
        condition: service_healthy
      api:
        condition: service_started

  mysql:
    image: mysql:8.4
    environment:
      MYSQL_DATABASE: ${DB_NAME:-workeddy}
      MYSQL_USER: ${DB_USER:-workeddy}
      MYSQL_PASSWORD: ${DB_PASSWORD:-workeddy}
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD:-rootsecret}
    healthcheck:
      test:
        - CMD-SHELL
        - mysqladmin ping -h 127.0.0.1 -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}
      interval: 10s
      timeout: 5s
      retries: 6
      start_period: 30s
    ports:
      - 3307:3306
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
  storage_data:
